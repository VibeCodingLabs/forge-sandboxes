version: '3.8'

services:
  gui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - FIRECRACKER_HOST=http://proxy:8080
    depends_on:
      - proxy
    restart: unless-stopped

  proxy:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./proxy:/app
    ports:
      - '8080:8080'
    command: sh -c "npm i express && node server.js"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
