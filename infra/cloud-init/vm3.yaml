#cloud-config
hostname: forge-vm3

packages:
  - nodejs
  - npm
  - bash
  - curl

runcmd:
  - npm install -g @vibecodinglabs/forge-core 2>/dev/null || echo 'forge-core deferred'
  - mkdir -p /workspace
  - touch /ready.flag

write_files:
  - path: /etc/forge-vm.conf
    content: |
      VM_ID=vm3
      FORGE_VERSION=1.0
      WORKSPACE=/workspace
